$kind: http-request
description: Creates a new room. Expects HTTP 201 Created with the new room resource in the response body.
url: "{{baseUrl}}/rooms"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "name": "Lecture Hall A",
      "capacity": 120
    }
order: 1000
